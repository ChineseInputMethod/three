# Rime schema
# encoding: utf-8
#
# 音形输入法
#

schema:
  name: 笔画反查			# 方案名称
  schema_id: three_stroke	# 方案标识符
  version: "2026.6.1.1"		# 版本号
  author:
    - www.shurufa.org		# 作者
  description:  |			# 描述信息
    zh=v	ch=;	sh=a	φ=o
    ai=l	ao=s	an=d	ㄦ=or
    ang=f	eng=n	ing=j	ong=k
    一=h	丨=g	丿=p	丶=t	乙=m

switches:
  - name: ascii_mode			#中英文轉換開關
    reset: 0
    states: ["中文", "西文"]
  - name: full_shape			#全角符號／半角符號開關
    states: ["半角", "全角"]
  - name: simplification		#轉化字開關
    reset: 1
    states: ["漢字", "汉字"]
  - name: ascii_punct			#中西文標點轉換開關
    states: ["，。", "，．"]

engine:								# 輸入引擎設定，即掛接組件的「處方」
  processors:							# 一、這批組件處理各類按鍵消息
    - ascii_composer					# ※ 處理西文模式及中西文切換
    - key_binder						# ※ 在特定條件下將按鍵綁定到其他按鍵，如重定義逗號、句號爲候選翻頁鍵
    - recognizer						# ※ 與 matcher 搭配，處理符合特定規則的輸入碼，如網址、反查等
    - speller							# ※ 拼寫處理器，接受字符按鍵，編輯輸入碼
    - punctuator						# ※ 句讀處理器，將單個字符按鍵直接映射爲文字符號
    - selector							# ※ 選字處理器，處理數字選字鍵、上、下候選定位、換頁鍵
    - navigator							# ※ 處理輸入欄內的光標移動鍵
    - express_editor					# ※ 編輯器，處理空格、回車上屏、回退鍵等
  segmentors:						# 二、這批組件識別不同內容類型，將輸入碼分段
    - ascii_segmentor					# ※ 標識西文段落
    - matcher							# ※ 標識符合特定規則的段落，如網址、反查等
    - abc_segmentor					# ※ 標識常規的文字段落
#    - affix_segmentor@three_stroke		# 笔画反查
    - punct_segmentor					# ※ 標識句讀段落
    - fallback_segmentor				# ※ 標識其他未標識段落
  translators:							# 三、這批組件翻譯特定類型的編碼段爲一組候選文字
    - echo_translator					# ※ 沒有其他候選字時，回顯輸入碼
    - punct_translator					# ※ 轉換標點符號
    - table_translator@custom_phrase	#自定义短语词库
    - reverse_lookup_translator			# ※ 反查翻譯器，用另一種編碼方案查碼
    - script_translator					# ※ 腳本翻譯器，用於拼音等基於音節表的輸入方案
#    - table_translator@three_stroke
#    - table_translator@reverse_lookup	# ※  碼表翻譯器#翻译器可以挂载多个方案，实现混打
  filters:								# 四、這批組件過濾翻譯的結果
#    - simplifier							# ※ 繁簡轉換
    - uniquifier							# ※ 過濾重複的候選字，有可能來自繁簡轉換
#    - reverse_lookup_filter@three_reverse_lookup

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba;	# 呃，倒背字母表完全是個人喜好
  delimiter: " '"							# 隔音符號用「'」；第一位的空白用來自動插入到音節邊界處
  algebra:								# 拼寫運算規則，這個纔是實現雙拼方案的重點。寫法有很多種，當然也可以把四百多個音節碼一條一條地列舉
    - xform|^([nl])ve|$1ue|
    - derive|^zh|V|            					# 替換聲母鍵，用大寫以防與原有的字母混淆
    - derive|^ch|;|
    - derive|^sh|A|
    - xform|^er$|ER|
    - xform|^(.+)r$|$1Or|
    - derive|^([aoe].*)|O$1|					# 添上固定的零聲母o，先標記爲大寫O
    - derive|ang|F|							# 替換韻母鍵
    - derive|eng|N|
    - derive|ing|J|
    - derive|ong|K|
    - derive|ai|L|
    - derive|ao|S|
    - derive|an|D|
    - xlit|V;AOFNJKLSDER|v;aofnjklsder|			# 最後把雙拼碼全部變小寫
    - xform/丨/g/
    - xform/一/h/
    - xform/乙/m/
    - xform/丿/p/
    - xform/丶/t/
#    - derive|^(.+)[[](.*)$|$1|					# 全音
#    - derive|^(.+)[[]([hgptm]{1})(.*)$|$1$2|	# 一形
#    - derive|^(.+)[[]([hgptm]{2})(.*)$|$1$2|	# 二形
#    - derive|^(.+)[[]([hgptm]{3})(.*)$|$1$2|	# 三形
#    - derive|^(.+)[[]([hgptm]{4})(.*)$|$1$2|	# 四形
#    - derive|^(.+)[[]([hgptm]{5})(.*)$|$1$2|	# 五形
#    - derive|^(.+)[[]([hgptm]{6,})$|$1$2|		# 全码 # 无法完美解决
    - xform|^(.+)[[]([hgptm]{2,})$|$2|			# 笔画

translator:
  dictionary: three_stroke				# 設定 script_translator 使用的詞典名
  prism: three_stroke					# prism 要以本輸入方案的名稱來命名，以免把朙月拼音的拼寫映射表覆蓋掉
  spelling_hints: 16
  preedit_format:					#上屛碼自定義
  comment_format:				# 提示碼自定義
    - xform/丨/g0/
    - xform/一/h1/
    - xform/乙/m2/
    - xform/丿/p3/
    - xform/丶/t4/
    - xform/(^|[ '])([^[]+)[[]([a-z;]\d+)(.*)/$1$2$3/
    - xform/g0/丨/
    - xform/h1/一/
    - xform/m2/乙/
    - xform/p3/丿/
    - xform/t4/丶/
    - xform/$/〕/
    - xform/^/〔/
    - xform/([nljqxy])v/$1ü/			# 這樣纔是漢語拼音 :-)

custom_phrase:				#自定义短语库，该文件一般为多个方案共享。
  dictionary: ""				#翻譯器將調取此字典文件
  user_dict: custom_phrase	#設定用戶詞典名
  db_class: stabledb			#設定用戶詞典類型，可設tabledb〔文本〕或userdb〔二進制〕
  enable_completion: false		#提前顯示尚未輸入完整碼的字
  enable_sentence: false		#是否開啓自動造句
  initial_quality: 1				#設定此翻譯器出字優先級

reverse_lookup:			#配置编码反查组件
  dictionary: stroke		#笔画输入法码表
  enable_completion: true	#提前顯示尚未輸入完整碼的字
  prefix: "`"				#前缀
  suffix: "'"				#分隔符
  tips: 〔筆畫〕			#标题
  preedit_format:			#上屛碼自定義
    - xlit/hspnz/一丨丿丶乙/
  comment_format:		#提示碼自定義
    - xform/$/〗/
    - xform/^/〖/
    - xform/([nl])v/$1ü/

three_stroke:
  tag: three_stroke
  dictionary: three_stroke
  enable_user_dict: true			# 不想自動調頻的話，將上條中「true」改爲「false」
  enable_sentence: true			# 是否開啓自動造句
  sentence_over_completion: true	# 在無全碼對應字而僅有逐鍵提示時也開啓智能組句〔僅table_translator有效〕
  enable_encoder: true			# 不想自動組詞〔記錄輸入過的詞，然後變成五碼固定詞〕的話可以把上條中「true」改爲「false」
  encode_commit_history: true		# 是否開啓自動造詞〔僅table_translator有效〕
  spelling_hints: 16
  preedit_format:					#上屛碼自定義
  comment_format:				# 提示碼自定義
    - "xform/\\[//"
    - xform/$/〕/
    - xform/^/〔/
    - xform/([nljqxy])v/$1ü/			# 這樣纔是漢語拼音 :-)

three_reverse_lookup:
  tags: [ three_stroke ]
  dictionary: three
  overwrite_comment: true	# 覆蓋其他提示
  comment_format: 
    - xform/$/〕/
    - xform/^/〔/
    - xform/([nljqxy])v/$1ü/		# 這樣纔是漢語拼音 :-)

three_stroke:
  extra_tags: [ three_radical ]

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: slash, send_sequence: "{Shift+Right}" }

recognizer:
  import_preset: default	#由外部統一文件導入
  patterns:				#配合segmentor的prefix和suffix完成段落劃分、tag分配 
#    punct: '^/([0-9]0?|[A-Za-z]+)$'
    reverse_lookup: "`[a-z]*;?$"
#    three_stroke: "^[hmpw;]{2,}$"

__patch:
  # 使用八股文語言模型
  - grammar:/hans?	#取值zh-han[ts]-t-essay-bg[wc]#没有找到此配置文件
  # 用家自選配置
  - three.custom:/patch?